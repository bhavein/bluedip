# example netlify.toml
 # Rule 1: Catch Uppercase TID parameter (Canonical)
[[redirects]]
  from = "/*"
  query = {TID = ":tid"}
  to = "/verify.html?TID=:tid"
  status = 301
  force = true

# Rule 2: Catch Lowercase tid parameter
[[redirects]]
  from = "/*"
  query = {tid = ":tid"}
  to = "/verify.html?TID=:tid"
  status = 301
  force = true

# Rule 3: Direct /verify path mapping
[[redirects]]
  from = "/verify"
  to = "/verify.html"
  status = 200
  force = true
  
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

 

