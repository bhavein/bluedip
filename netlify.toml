# Prismatom Trust Page redirect rules
#
# IMPORTANT: from = "/" not "/*"
# Using "/*" matches EVERY path including /verify.html?TID=...
# which causes an infinite redirect loop (ERR_TOO_MANY_REDIRECTS).
# Using "/" matches only the root path — the SMS link destination.

# Rule 1: Catch uppercase TID parameter at root (canonical form)
# Matches: bluedip.in?TID=abc  and  bluedip.in/?TID=abc
[[redirects]]
  from = "/"
  query = {TID = ":tid"}
  to = "/verify.html?TID=:tid"
  status = 302
  force = true

# Rule 2: Catch lowercase tid parameter at root (defensive fallback)
# Matches: bluedip.in?tid=abc  and  bluedip.in/?tid=abc
[[redirects]]
  from = "/"
  query = {tid = ":tid"}
  to = "/verify.html?TID=:tid"
  status = 302
  force = true

# Rule 3: Direct /verify path → /verify.html (convenience mapping)
[[redirects]]
  from = "/verify"
  to = "/verify.html"
  status = 200
  force = true
  
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

 

